name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── macOS (Apple Silicon arm64) ──────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build .app
        run: |
          pyinstaller \
            --windowed \
            --name "PianoPilot for FP-30X" \
            --collect-all roland_fp30x_controller \
            --hidden-import mido.backends.rtmidi \
            src/roland_fp30x_controller/__main__.py

      - name: Ad-hoc code sign (requerido en Apple Silicon)
        run: |
          codesign --force --deep --sign - \
            "dist/PianoPilot for FP-30X.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "PianoPilot for FP-30X" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --app-drop-link 425 120 \
            "PianoPilot-for-FP30X-${{ github.ref_name }}-mac-arm64.dmg" \
            "dist/PianoPilot for FP-30X.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: "PianoPilot-for-FP30X-${{ github.ref_name }}-mac-arm64.dmg"

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pillow

      - name: Generate .ico icon
        run: python scripts/make_ico.py app_icon.ico

      - name: Build .exe
        run: |
          pyinstaller `
            --windowed `
            --onefile `
            --icon app_icon.ico `
            --name "PianoPilot for FP-30X" `
            --collect-all roland_fp30x_controller `
            --collect-all mido `
            --hidden-import mido.backends.rtmidi `
            --hidden-import rtmidi `
            src/roland_fp30x_controller/__main__.py

      - name: Rename artifact
        run: |
          Move-Item `
            "dist\PianoPilot for FP-30X.exe" `
            "PianoPilot-for-FP30X-${{ github.ref_name }}-windows.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "PianoPilot-for-FP30X-${{ github.ref_name }}-windows.exe"

  # ── Windows MSIX (Windows Store) ─────────────────────────────────────────
  build-msix:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pillow

      - name: Generate .ico icon
        run: python scripts/make_ico.py app_icon.ico

      - name: Build folder layout (PyInstaller)
        run: |
          pyinstaller `
            --windowed `
            --icon app_icon.ico `
            --name PianoPilot `
            --collect-all roland_fp30x_controller `
            --collect-all mido `
            --hidden-import mido.backends.rtmidi `
            --hidden-import rtmidi `
            src/roland_fp30x_controller/__main__.py

      - name: Generate MSIX assets
        run: python scripts/make_msix_assets.py packaging/windows/Assets

      - name: Assemble MSIX package layout
        shell: pwsh
        run: |
          $pkgDir = "dist\PianoPilot"

          # Inyectar versión (vX.Y.Z → X.Y.Z.0) y Publisher en el manifiesto.
          # .Trim() elimina newlines o espacios sobrantes del secreto (copy-paste).
          $tag       = "${{ github.ref_name }}".TrimStart('v')
          $version   = "$tag.0"
          $publisher = "${{ secrets.MSIX_PUBLISHER }}".Trim()

          $content = Get-Content "packaging\windows\AppxManifest.xml" -Raw -Encoding UTF8
          $content = $content -replace 'PACKAGE_VERSION', $version
          $content = $content -replace 'PUBLISHER_CN',    $publisher
          [System.IO.File]::WriteAllText(
            (Resolve-Path $pkgDir).Path + "\AppxManifest.xml",
            $content,
            [System.Text.Encoding]::UTF8
          )

          # Verificar que el placeholder fue sustituido
          if (Select-String -Path "$pkgDir\AppxManifest.xml" -Pattern 'PUBLISHER_CN|PACKAGE_VERSION' -Quiet) {
            Write-Error "El manifiesto aún contiene placeholders sin sustituir."
            exit 1
          }
          Write-Host "Manifiesto generado correctamente (version=$version)"

          # Copiar assets
          New-Item -ItemType Directory -Force "$pkgDir\Assets" | Out-Null
          Copy-Item packaging\windows\Assets\* "$pkgDir\Assets\"

      - name: Build MSIX with makeappx
        shell: pwsh
        run: |
          # Localizar makeappx.exe del Windows SDK instalado en el runner
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter makeappx.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object FullName |
            Select-Object -Last 1 -ExpandProperty FullName

          if (-not $makeappx) { throw "makeappx.exe no encontrado" }
          Write-Host "Usando: $makeappx"

          $msix = "PianoPilot-for-FP30X-${{ github.ref_name }}-windows.msix"
          & $makeappx pack /d dist\PianoPilot /p $msix /nv
          Write-Host "MSIX generado: $msix"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: "PianoPilot-for-FP30X-${{ github.ref_name }}-windows.msix"

  # ── Crear GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-msix]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: "PianoPilot for FP-30X ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            *.dmg
            *.exe
            *.msix
